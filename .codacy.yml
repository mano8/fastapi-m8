---
engines:
  bandit:
    enabled: true
  ruff:
    enabled: true
  markdownlint:
    enabled: true
  pylint:
    enabled: false
  prospector:
    enabled: false
  pydocstyle:
    enabled: false
  pycodestyle:
    enabled: false
  pyflakes:
    enabled: false

exclude_paths:
  - "tests/**"
  - "dist/**"
  - "*.egg-info/**"
  - ".pytest_cache/**"
  - "**/__pycache__/**"
  # SECURITY.md is kept markdownlint-clean by hand; excluded here because
  # Codacy's prose analyzer misclassifies a security policy doc (flags standard
  # security acronyms such as CA/TTL/JTI as "undefined" on every revision).
  - "SECURITY.md"
